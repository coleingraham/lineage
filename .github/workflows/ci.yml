name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
      - run: pnpm turbo lint
      - run: pnpm turbo test
      - run: pnpm turbo build

  check-core-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify @lineage/core has zero runtime dependencies
        run: |
          DEPS=$(node -e "const p=JSON.parse(require('fs').readFileSync('packages/core/package.json','utf8')); console.log(Object.keys(p.dependencies||{}).length)")
          if [ "$DEPS" -ne "0" ]; then
            echo "ERROR: @lineage/core must have zero runtime dependencies, found $DEPS"
            exit 1
          fi
